name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Syntax check server.js
        run: node --check server.js

      - name: Syntax check routes/*.js
        run: |
          for f in routes/*.js; do
            echo "Checking $f ..."
            node --check "$f"
          done

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify package.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Check for trailing whitespace
        run: |
          if grep -rPn ' +$' --include='*.js' --include='*.json' --include='*.css' --include='*.html' --exclude-dir=node_modules .; then
            echo "Trailing whitespace found. Please remove it."
            exit 1
          fi
